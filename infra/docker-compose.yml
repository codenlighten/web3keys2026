# Data services for web3keys (Postgres + Redis), bound to localhost on the droplet.
# The Node app + worker run under systemd and connect via DATABASE_URL / REDIS_URL.
#
#   cd /opt/web3keys/infra && docker compose --env-file /etc/web3keys/infra.env up -d
#
# infra.env provides POSTGRES_PASSWORD (keep it out of git).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: web3keys
      POSTGRES_DB: web3keys
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U web3keys']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
