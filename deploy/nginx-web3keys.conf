# nginx reverse proxy for web3keys.com -> node app on 127.0.0.1:3000
# Placed at /etc/nginx/sites-available/web3keys and symlinked into sites-enabled.
# certbot --nginx will inject the TLS (443) server block and the HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name web3keys.com www.web3keys.com;

    # Allow ACME HTTP-01 challenges (certbot webroot, if used).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
